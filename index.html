<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>県内極値一覧</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="topbar">
    <h1>県内極値一覧</h1>

    <div class="controls">
      <label>
        都道府県
        <select id="prefSelect">
          <option value="nara">奈良県</option>
        </select>
      </label>

      <label>
        月
        <select id="monthSelect">
          <option value="all">通年</option>
          <option value="1">1月</option>
          <option value="2">2月</option>
          <option value="3">3月</option>
          <option value="4">4月</option>
          <option value="5">5月</option>
          <option value="6">6月</option>
          <option value="7">7月</option>
          <option value="8">8月</option>
          <option value="9">9月</option>
          <option value="10">10月</option>
          <option value="11">11月</option>
          <option value="12">12月</option>
        </select>
      </label>

      <button id="loadBtn">表示</button>
    </div>

    <div class="element-panel">
      <div class="element-row">
        <div class="element-label">気温</div>
        <div class="element-options">
          <label><input type="radio" name="element" value="dailyMaxTemp" checked> 最高気温</label>
          <label><input type="radio" name="element" value="dailyMinTemp"> 最低気温</label>
        </div>
      </div>

      <div class="element-row">
        <div class="element-label">降水</div>
        <div class="element-options">
          <label><input type="radio" name="element" value="dailyPrecip"> 日降水量</label>
          <label><input type="radio" name="element" value="max10mPrecip"> 最大10分間降水量</label>
          <label><input type="radio" name="element" value="max1hPrecip"> 最大1時間降水量</label>
        </div>
      </div>
    </div>

    <div class="note">
      赤系: 実況が10位以内に入る見込み / 黄系: 1年以内の記録
    </div>
    <div id="status" class="status">読み込み待ち</div>
  </header>

  <main class="main">
    <div class="table-wrap">
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>

  <script src="./app.js"></script>
</body>
</html>
