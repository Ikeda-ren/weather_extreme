<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>県内極値一覧</title>

  <meta name="theme-color" content="#0077b6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="県内極値一覧" />

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <h1>県内極値一覧</h1>

    <div class="controls">
      <label>
        <span>地域</span>
        <select id="regionSelect"></select>
      </label>
    
      <label>
        <span>都道府県</span>
        <select id="prefSelect"></select>
      </label>
    
      <label>
        <span>月</span>
        <select id="monthSelect">
          <option value="all">通年</option>
          <option value="1">1月</option>
          <option value="2">2月</option>
          <option value="3">3月</option>
          <option value="4">4月</option>
          <option value="5">5月</option>
          <option value="6">6月</option>
          <option value="7">7月</option>
          <option value="8">8月</option>
          <option value="9">9月</option>
          <option value="10">10月</option>
          <option value="11">11月</option>
          <option value="12">12月</option>
        </select>
      </label>
    
      <button id="topRankAlert" class="top-rank-alert" hidden>極値1位更新有り</button>
      <button id="installAppBtn" class="install-app-btn" hidden>アプリとして追加</button>
    </div>
    
    <details id="liveSummarySection" class="live-summary-details" open>
      <summary class="summary-row">
        <span class="summary-title">実況で10位以内に入った項目</span>
        <span id="rankInBadge" class="rank-in-badge" hidden>ランクインあり</span>
      </summary>
      <div id="liveSummaryBody" class="live-summary-body">
        読み込み待ち
      </div>
    </details>
    
    <details class="element-details">
      <summary>要素選択を開く / 閉じる</summary>
      <div id="elementPanel" class="element-panel"></div>
    </details>
    
    <div id="statusBox" class="status">読み込み待ち</div>
    
    <main class="main">
      <div class="table-wrap">
        <table id="rankTable">
          <thead id="rankTableHead"></thead>
          <tbody id="rankTableBody"></tbody>
        </table>
      </div>
    
      <div class="note-bottom">
        赤系：実況での記録 / 黄系：1年以内の記録
      </div>
    
      <details class="debug-details">
        <summary>診断情報</summary>
        <div id="debugGrid" class="debug-grid"></div>
      </details>
    </main>

  <script src="./app.js"></script>
</body>
</html>
